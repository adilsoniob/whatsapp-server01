    function formatChartData(queryParams, dataJson) {
	    const dataX = queryParams.data_x;
	    const dataY = queryParams.data_y;
	    const legendData = [];
	    const formattedLegendData = [];
	    const totalData = [];
	    const xAxisData = [];
	    const formattedXAxisData = [];
	    const seriesData = [];
	    const colors = [];
	    const dataMap = {};
	    const xAxisTotalMap = {};
	    let flag = false;
	    const formatName = (code, isMcc = false) => {
	        if (!isMcc) return code;
	        const countryCode = getCountryByMcc(code);
	        return countryCode ? (code + "/" + $.i18n("country.name."+countryCode)) : code;
	    };
	
	    const calculateValue = (dataObj) => {
	        const { succ, fail, drsucc, drsent } = dataObj;
	        switch (dataY) {
	            case 'sendingSuccessRate':
	                return calculatePercentage(succ, succ + fail);
	            case 'drSuccessRate':
	                return calculatePercentage(drsucc, drsent);
	            default:
	                return dataObj[dataY] || 0;
	        }
	    };
	
	    Object.entries(dataJson).forEach(([key, data]) => {
	        const [user, time, mcc] = key.split("-|-");
	        let legendKey, xAxisKey, comboKey;
	        if (dataX === 'mcc') {
	            legendKey = user;
	            xAxisKey = mcc;
	        } else if (dataX === 'user') {
	            legendKey = mcc;
	            xAxisKey = user;
	        } else { // dataX === 'starttm'
	            if(queryParams.mcc && queryParams.mcc!=''){
	                flag = true;
	                legendKey = user;
		            xAxisKey = time;
	            }else{
		            legendKey = mcc;
		            xAxisKey = time;
	            }
	            
	        }
	        comboKey = legendKey + "-|-" + xAxisKey;
	        if (!legendData.includes(legendKey)) legendData.push(legendKey);
	        if (!xAxisData.includes(xAxisKey)) xAxisData.push(xAxisKey);
	
	        dataMap[comboKey] = dataMap[comboKey] 
	            ? sumJson(data, dataMap[comboKey]) 
	            : Object.assign({}, data);
	
	        xAxisTotalMap[xAxisKey] = xAxisTotalMap[xAxisKey]
	            ? sumJson(data, xAxisTotalMap[xAxisKey])
	            : Object.assign({}, data);
	    });
	
	    legendData.forEach((legend, idx) => {
	        colors.push(color16());
	        const seriesItem = [];
	
	        xAxisData.forEach((xAxis, xIdx) => {
	            if (idx === 0) {
	                const totalObj = xAxisTotalMap[xAxis];
	                totalData.push(calculateValue(totalObj));
	                formattedXAxisData.push(formatName(xAxis, dataX === 'mcc'));
	            }
	            const comboKey = legend + "-|-" + xAxis;
	            const dataObj = dataMap[comboKey] || { succ: 0, fail: 0, drsucc: 0, drsent: 0 };
	            seriesItem.push(calculateValue(dataObj));
	        });
	
	        const isLegendMcc = dataX === 'user' || dataX === 'starttm';
	        formattedLegendData.push(formatName(legend, isLegendMcc));
	        seriesData.push(seriesItem);
	    });
	    
	    if(flag){
           formattedLegendData.unshift($.i18n("total"));
           seriesData.unshift(totalData);
           colors.unshift(color16());
        }
	    return {
	        formattedLegendData,
	        totalData,
	        formattedXAxisData,
	        seriesData,
	        colors
	    };
	}

             var search_mnc = $("#search-"+oldTableId+"-mnc").val();
             if(search_mnc && search_mnc !=""){
                 title_text+= '<div class="col-lg-4 col-md-4 col-sm-12 col-xs-12">'+ label_val_html_span($.i18n("db.tbUserStat.mnc"), search_mnc) + '</div>';
             } 
         }else{
             header.html(header_content+"<font style='color:red;font-size: 12px'>"+$.i18n("data_sources.list")+"</font>");
         }
         var h = 0;
         array_title.forEach(element => {
             if(h == 0 || h == 2){
                title_text+= '<div class="col-lg-2 col-md-2 col-sm-6 col-xs-6">'+ element + '</div>';
             }else{
             	title_text+= '<div class="col-lg-4 col-md-4 col-sm-6 col-xs-6">'+ element + '</div>';
             }
             h++;
		 });
         $("#ID_title_"+tableId).html('<div class="row">' +title_text + '</div>');
         
         var f_data = formatChartData(query_params, data_json);
         f_data = echartsDataSort(f_data);
         var tot_data = f_data.totalData;
         var option = {
                    title:{
				        text: '',
				        x: 'center',
				        y2:0
				    },
				    color: f_data.colors,
				    tooltip: {
					    trigger: 'axis',
					    axisPointer: { type: 'shadow' },
					    formatter: function (params) {
					        const TOP_N = 10;
					        const listData = params;
					        let html = '';
					        const dataIndex = listData[0].dataIndex;
					        const tot_cnt = tot_data[dataIndex];
					        let tooltip_div_width = 300;
					        if (window.IS_MOBILE) {
					            tooltip_div_width = 200;
					        }
					        
					        html += '<span>' + params[0].name + '<span>';
					        html += tooltipdivRowHtml(['&nbsp;', '&nbsp;', y_name]);
					        if(!(query_params.data_x == 'starttm' && query_params.mcc && query_params.mcc!='')){
					            const formattedTot_cnt = (query_params.data_y === 'sendingSuccessRate' || query_params.data_y === 'drSuccessRate') 
						            ? tot_cnt + '%' 
						            : tot_cnt;
						        html += tooltipdivRowHtml([
						            '<i style="display: inline-block;width:10px;height: 10px;background: #777;margin-right: 5px;border-radius: 50%;"></i>', 
						            $.i18n("total"), 
						            formattedTot_cnt
						        ]);
					        }
					
					        const sortedData = [...listData].sort((a, b) => {
					            const valA = a.data || 0;
					            const valB = b.data || 0;
					            return valB - valA;
					        });
					        const topNData = sortedData.slice(0, TOP_N);
					
					        const background_color = "background-color: #f9f9f9";
					        topNData.forEach((item, i) => {
					            const v = item.data || 0;
					            const series_name = item.seriesName;
					            const formattedValue = (query_params.data_y === 'sendingSuccessRate' || query_params.data_y === 'drSuccessRate')
					                ? v + '%'
					                : v;
					            const rowStyle = (i === 0 || i % 2 === 0) ? background_color : '';
					            html += tooltipdivRowHtml([
					                '<i style="display: inline-block;width:10px;height: 10px;background: '+item.color+';margin-right: 5px;border-radius: 50%;"></i>',
					                series_name,
					                formattedValue
					            ], rowStyle);
					        });
					
					        if (listData.length > TOP_N) {
					            html += tooltipdivRowHtml([
					                '<i style="display: inline-block;width:10px;height: 10px;background: transparent;margin-right: 5px;"></i>',
					                $.i18n("echartsTooltipExceedingDisplayPageTips", (listData.length - TOP_N)),
					                ''
					            ]);
					        }
					
					        return '<div class="showBox" style="width:'+tooltip_div_width+'px;">'+html+'</div>';
					    }
					},
				    toolbox:toolbox,
				    grid: option_grid,
				    legend: {
				        type: 'scroll',
					    orient: 'horizontal',
					    top: 'top',
					    right: 10,
					    button: 30,
					    left: 10,
					    itemWidth: 10, 
					    itemHeight: 10,
					    itemGap: 15,
					    textStyle: {
					        lineHeight: 22,
					        fontSize: 12,
					    },
					    pageButtonItemGap: 5,
					    pageSize: 10, 
				        show: true,
				        data: f_data.formattedLegendData,
				        y:'top'
				    },
				    xAxis: [
				        {
				            name: x_name,
				            type: 'category',
				            axisTick: {show: false},
				            data: f_data.formattedXAxisData,
				            axisLabel: {
				                rotate: 45,
                                interval: 0,
					            formatter: function(value){
									return value;
								}
					        },
					        nameTextStyle: { color: '#333', fontSize: 16, fontWeight: 'bold'}
				        }
				    ],
				    yAxis: [
				        {
				            name: y_name,
						    nameGap: 17,
				            type: 'value',
				            minInterval: 1,
				            nameTextStyle: { color: '#333', fontSize: 16, fontWeight: 'bold', align: 'right', verticalAlign: 'middle'}
				        }
				    ],
				    series: userSta_series_arr(f_data, query_params)
				}
	    return option;
	}
	
	function userSta_series_arr(f_data, query_params){
	   var legend_data = f_data.formattedLegendData;
	   var series_datas = f_data.seriesData;
	   var data_y = query_params.data_y;
	   var type = query_params.chart_type;
	   var isPercentage = data_y == 'sendingSuccessRate' || data_y == 'drSuccessRate';
       var arr = [];
       var len = series_datas.length;
       for(var i=0;i<len;i++){
    	  var series_data = series_datas[i]; 
          var temp = {
	            name: legend_data[i],
	            type: type,
	            label: {
				    show: true,
				    formatter: (isPercentage ? '{c}%' : '{c}'),
				    fontSize: 16,
				    distance: 15,
				    rich: {
				        name: {
				            textBorderColor: '#fff'
				        }
				    }
				},
	            barWidth : 10,
	            label: {
	                normal: {
	                    show: true,
	                    position: 'top',
	                    formatter: function (params) {return labelGtZeroDisplay(params, isPercentage)}
	                }
	            },
	            data: series_data
	        }
	        if(type == 'bar'){
                 temp.stack = 'Total';
             }
	      arr.push(temp);
       }
       return arr;
    }
    
    function labelGtZeroDisplay(params, isPercentage){
        if (params.value > 0) {
           return isPercentage ? params.value +'%' : params.value;
        } else {
           return '';
        }
    }
	
	function echartsDataSort(sortData){
	    const legendData = sortData.formattedLegendData;
		const seriesData = sortData.seriesData;
		
		const countryStats = legendData.map((name, index) => ({
		  name,
		  total: seriesData[index].reduce((sum, val) => sum + val, 0),
		  originalIndex: index
		}));
		
		countryStats.sort((a, b) => b.total - a.total);
		
		const sortedLegend = countryStats.map(info => info.name);
		const sortedSeries = countryStats.map(info => seriesData[info.originalIndex]);
		
		sortData.formattedLegendData = sortedLegend;
		sortData.seriesData = sortedSeries;
		return sortData;
	}
	
	function loadDataAnalysisAjax(oldTableId, params){
		if(chartModalLock) return;
	    chartModalLock = true;
	    
	    var queryUrl = getLocalStorageModel(oldTableId, "requestUrl")+ "loadChartData.ajax";
	    var search_params = getSearchParams(oldTableId);
  	    search_params["data_x"] = params.data_x;
  	    search_params["data_y"] = params.data_y;
  	    search_params["cx_ORDER_LIST"] = '[["starttm",1]]';
  	    var loadInx = layer.load(2); 
        $.ajax({
      	    url:window.PATH + queryUrl,
      	    data: search_params,
      	    type:"post",
      	    dataType: "json",
      	    success:function(req){
      	    	if(!res_state(req.state)){
      	    		layer.msg.error(req.message);	
      	    	}else{
      	    		var newResult = req.data;
	      	    	waitForModalReady(oldTableId, params, newResult, 1);
      	    	}
      	    	layer.close(loadInx); 
      	    }, 
      	    error: function (xhr, type, exception) {
      	    	layer.close(loadInx); 
            }
      	 });
	}
	
	function waitForModalReady(oldTableId, params, newResult, dataSources) {
	    var tableId = "dataAnalysisChart-"+oldTableId;
	    var modalId = tableId + "-detail2";
	    var checkTimes = 0;
	
	    var checkInterval = setInterval(function() {
	        checkTimes++;
	        var $modal = $('#' + modalId);
	        
	        if($modal.length > 0 || checkTimes >= 10) {
	            clearInterval(checkInterval);
	            showDataAnalysisChart(oldTableId, params, newResult, dataSources);
	            chartModalLock = false;
	        }
	    }, 50);
	}
	
	</script>
