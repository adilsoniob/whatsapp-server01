    function selectedSendSmsLibIds(tableId, typeId, isAllSelected, smsLibraryCnt){
         var key = "type_"+typeId;
         var isExit = sendSmsPage_selected_sendSmsLibIds.hasOwnProperty(key);
         var checkAllBtn = $("#"+tableId+"-tableCheckAllBtn_type"+typeId);
         var par = {typeId : typeId};
         if(isAllSelected || checkAllBtn[0].checked){
             par.allchecked = checkAllBtn[0].checked;
             par.arr = [];
         }else{
             par.allchecked = false;
             var checkedsubList = $("#"+tableId+"-smsLibrary").find("div.typeId_"+typeId).find("input[name*='"+tableId+"-rowItems']");
	 	     var arr = [];
	 	     for(var i=0;i<checkedsubList.length;i++){
	 	         var checkbox_obj = checkedsubList[i];
	 	         var arr1 = checkbox_obj.value.split("-|-");
	 	         var id = arr1[0]+"";
	 	         if(checkbox_obj.checked){
	 	             arr.push(id);
	 	         }
	 	     }
	 	     par.arr = arr;
         } 
         sendSmsPage_selected_sendSmsLibIds[key] = par;
         $("#"+tableId+"-smsLibraryType-"+typeId).html(smsLibraryCnt);
    }
    
    function jobOperationModal(tableId, actionName) {
        var temp = "confirmStart";
        if(actionName == "stop"){
            temp = "confirmStop";
        }else if(actionName == "resendfail"){
            temp = "confirmResendfailureSMS";
        }else if(actionName == "resendall"){
            temp = "confirmResendAll";
        }
        layer.confirm($.i18n("frame.from.tips." + temp), function (idx) {
            var loadInx = layer.load(2);
            var params = {
                idList: deleteRowsList(tableId),
                actionName: actionName
            };
            $.ajax({
                url: window.PATH + getLocalStorageModel(tableId, "requestUrl") + "jobOperation.ajax",
                dataType: "json",
                async: true,
                data: params,
                type: "POST",
                success: function (res) {
                    layer.msg.success(res.message);
                    queryTableDataModel(tableId);
                    $("#" + tableId + "-tools-start,#" + tableId + "-tools-stop,#" + tableId + "-tools-resendfail,#" + tableId + "-tools-resendall").removeAttr("disabled").attr("disabled", "disabled").removeClass("blue").addClass("gray_tableModal");
                    layer.close(loadInx);
                },
                error: function () {
                    layer.close(loadInx);
                }
            });
            layer.close(idx);
        });
    }
