    function initTurnoverStatModel(tableId, contentStat){
    	var userType = window.UTYPE;
		var stat = $("#"+tableId+"-stat");
		var currency_type_icon = "";
		if(window.IS_SHOW_CUR_ICON){
			currency_type_icon = currency_type_icon_html();
		}
		var com_html = '';
		if("sendRcdTab2" == tableId){
			var com_array =[[["sent","#EEC900"],["success","#63B8FF"],["fail","#EE6363"],["resent","#EE6363"],["success_rate","#00CD66"]],[["drsent","#EEC900"],["drsuccess","#63B8FF"],["drfail","#EE6363"],["dr_success_rate","#00CD66"]]];
			if(userType == window.CONSUMER_TYPE && (window.IS_VIEW_DR_ENABLE ==0 || window.IS_VIEW_DR_ENABLE ==2)){
				com_array =[[["sent","#EEC900"],["success","#63B8FF"],["fail","#EE6363"],["resent","#EE6363"],["success_rate","#00CD66"]]];
			}
			for ( var i = 0; i < com_array.length; i++) {
				var row_data = com_array[i];
				com_html += '<div class="row">';
				for ( var x = 0; x < row_data.length; x++) {
					var leb = row_data[x][0];
					var color = row_data[x][1];
					com_html += '<div class="col-md-2"><span style="width:100px;display:inline-block;text-align:right;">'+$.i18n("db.tbSMSRcd."+ leb)+': </span> <strong style="font-family: Arial;font-size: 20px;font-weight: 400;margin-left: 15px;margin-right: 10px;vertical-align: middle;color:'+color+';">'+contentStat[leb].toLocaleString()+'</strong></div>';
				}
				com_html+= '</div>';
			}
		}
		var html = '';
		
		var arrayLeb = [];
		var arrayColor = [];
		
		if(window.HIDE_INCOME_TURNOVER == 0){
			arrayLeb.push("pay");
			arrayColor.push("#EEC900");
		}
		if(window.HIDE_INCOME_COST == 0){
			arrayLeb.push("cost");
			arrayColor.push("#EEC900");
		}
		if(window.HIDE_INCOME_GIFT == 0){
			arrayLeb.push("gift");
			arrayColor.push("#EEC900");
		}
			
		if(userType > 0){
			if(userType == window.CONSUMER_TYPE){
				arrayLeb = ["amount_consumption"];
				arrayColor = ["#EEC900"];
			}else if(userType == window.SUPPLIER_TYPE){
				arrayLeb = ["cost"];
				arrayColor = ["#EEC900"];
			}
		}
		if(arrayLeb.length > 0){
			html+= '<div class="row">';
			for ( var j = 0; j < arrayLeb.length; j++) {
				html += '<div class="col-md-4"><span style="width:100px;display:inline-block;text-align:right;">'+$.i18n("db.tbSMSRcd."+ arrayLeb[j])+': </span> <strong style="font-family: Arial;font-size: 20px;font-weight: 400;margin-left: 15px;margin-right: 10px;vertical-align: middle;color:'+arrayColor[j]+';">'+currency_type_icon + contentStat[arrayLeb[j] =="amount_consumption" ? "pay" : arrayLeb[j]].toLocaleString()+'</strong></div>';
			}
			html+= '</div>';
		}
		
		html+= com_html;
		stat.html(html);
    }
    
    function toolSaveSmsRecResend(tableId, oldTabId){
	    var idList = deleteRowsList(oldTabId);
	    var params = getSearchParams(oldTabId);
	    var $resendCnt = $("#edit-"+tableId+"-resendCnt");  
	    var $content = $("#edit-"+tableId+"-content"); 
	    var temp = "based_on_search_criteria_tip";
	    params.idList = idList;
	    if(idList && idList.length > 0){
	        temp = "based_on_the_selected_option.tip";
	    }
	    params.token = window.token;
	   	params.resendCnt = $.trim($resendCnt.val());
	   	params.content = $.trim($content.val());
	   	params.actionName = $.i18n("resendSms");
	   	if(params.resendCnt == ""){

	   	}
   		 
        layer.confirm($.i18n(temp) + "," +$.i18n("frame.from.tips.confirmResendAll"), function (idx) {
            var loadInx = layer.load(2);
	   		$.ajax({
	    	    url: window.PATH+ getLocalStorageModel(tableId, "requestUrl")+ "resendSms.ajax",

	    	    async: true, 
	    	    data: params ,

	    	    }
